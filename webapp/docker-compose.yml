services:
  backend:
    build:
      context: ..
      dockerfile: webapp/backend/Dockerfile
    volumes:
      - ./backend/.env:/app/webapp/backend/.env:ro
      - journal:/data/journal
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    # Serves the frontend and proxies /api to the backend over plain HTTP on a
    # single port. TLS/HTTPS is not handled here — reach it directly, or front
    # it with a reverse proxy of your choice. Bound to loopback by default so it
    # is not publicly exposed; override WEBAPP_PORT (e.g. 0.0.0.0:8080) to change
    # the bind address/port.
    ports:
      - "${WEBAPP_PORT:-127.0.0.1:8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  journal:
