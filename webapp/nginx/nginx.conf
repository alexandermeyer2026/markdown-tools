# Plain-HTTP server: serves the built frontend and proxies /api to the backend.
# Used in both production and local dev (mounted by docker-compose*.yml).
# TLS is not handled here. If a reverse proxy sits in front, it should pass the
# original scheme in X-Forwarded-Proto (honored below); on direct access this
# falls back to the request scheme.

# Honor X-Forwarded-Proto from an upstream proxy if present, else the scheme.
map $http_x_forwarded_proto $forwarded_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

server {
    listen 80;

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_proto;
    }
}
